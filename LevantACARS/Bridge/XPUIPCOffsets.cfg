; ============================================================================
; XPUIPCOffsets.cfg — Levant VA ACARS (X-Plane)
; Comprehensive dataref mappings for full ACARS functionality in X-Plane
;
; INSTALLATION:
;   1. Locate your XPUIPC plugin folder:
;        X-Plane 12/Resources/plugins/XPUIPC/
;   2. Open (or create) "XPUIPCOffsets.cfg" in that folder
;   3. Copy ALL Dataref lines below into that file
;   4. Restart X-Plane
;
; This config maps X-Plane datarefs to FSUIPC-compatible offsets so the
; LevantACARS C# application can read flight data identically from both sims.
; ============================================================================

; ══════════════════════════════════════════════════════════════════════════
; POSITION & NAVIGATION
; ══════════════════════════════════════════════════════════════════════════

; Latitude (0x0560) - 8 bytes, double precision
Dataref pos_lat sim/flightmodel/position/latitude double Offset 0x0560 FLOAT64 1 r

; Longitude (0x0568) - 8 bytes, double precision
Dataref pos_lon sim/flightmodel/position/longitude double Offset 0x0568 FLOAT64 1 r

; Altitude True (0x0570) - 8 bytes, in meters
Dataref pos_alt_true sim/flightmodel/position/elevation double Offset 0x0570 FLOAT64 1 r

; Indicated Altitude (0x3324) - 4 bytes, feet
Dataref alt_indicated sim/cockpit2/gauges/indicators/altitude_ft_pilot float Offset 0x3324 FLOAT 1 r

; Radio Altitude (0x31E4) - 4 bytes, meters * 65536
Dataref radio_alt sim/cockpit2/gauges/indicators/radio_altimeter_height_ft_pilot float Offset 0x31E4 FLOAT 1 r

; Magnetic Heading (0x0580) - 4 bytes
Dataref mag_heading sim/flightmodel/position/mag_psi float Offset 0x0580 FLOAT 1 r

; ══════════════════════════════════════════════════════════════════════════
; FLIGHT DATA
; ══════════════════════════════════════════════════════════════════════════

; Ground Speed (0x02B4) - 4 bytes, m/s
Dataref ground_speed sim/flightmodel/position/groundspeed float Offset 0x02B4 FLOAT 1 r

; Indicated Airspeed (0x02BC) - 4 bytes, knots * 128
Dataref ias sim/flightmodel/position/indicated_airspeed float Offset 0x02BC FLOAT 1 r

; Vertical Speed (0x02C8) - 4 bytes, m/s * 256
Dataref vs sim/flightmodel/position/vh_ind_fpm float Offset 0x02C8 FLOAT 1 r

; Pitch (0x0578) - 4 bytes, degrees
Dataref pitch sim/flightmodel/position/theta float Offset 0x0578 FLOAT 1 r

; Bank (0x057C) - 4 bytes, degrees
Dataref bank sim/flightmodel/position/phi float Offset 0x057C FLOAT 1 r

; G-Force (0x11BA) - 2 bytes
Dataref gforce sim/flightmodel/forces/g_nrml float Offset 0x11BA INT16 1 r

; ══════════════════════════════════════════════════════════════════════════
; AIRCRAFT STATE
; ══════════════════════════════════════════════════════════════════════════

; On Ground Flag (0x0366) - 2 bytes, 0=airborne, 1=on ground
Dataref on_ground sim/flightmodel/failures/onground_any int Offset 0x0366 INT16 1 r

; Pause Indicator (0x0264) - 2 bytes, 0=not paused, 1=paused
Dataref paused sim/time/paused int Offset 0x0264 INT16 1 r

; Sim Rate (0x0C1A) - 2 bytes, rate * 256
Dataref sim_rate sim/time/sim_speed float Offset 0x0C1A INT16 1 r

; Aircraft Title (0x3D00) - 256 bytes string
Dataref aircraft_title sim/aircraft/view/acf_descrip string Offset 0x3D00 STRING 256 r

; ══════════════════════════════════════════════════════════════════════════
; CONTROLS & SYSTEMS
; ══════════════════════════════════════════════════════════════════════════

; Lights (0x0D0C) - 2 bytes bitfield
Dataref lights_nav sim/cockpit2/switches/navigation_lights_on int Offset 0x0D0C INT16 1 r

; Flaps Position (0x0BE0) - 4 bytes, 0-16383
Dataref flaps_pos sim/cockpit2/controls/flap_ratio float Offset 0x0BE0 FLOAT 1 r

; Gear Position (0x0BE8) - 4 bytes, 0=up, 16383=down
Dataref gear_pos sim/cockpit2/controls/gear_handle_down int Offset 0x0BE8 INT32 1 r

; Parking Brake (0x0BC8) - 2 bytes, 0=off, 32767=on
Dataref parking_brake sim/cockpit2/controls/parking_brake_ratio float Offset 0x0BC8 INT16 1 r

; Throttle 1 (0x088C) - 2 bytes, -4096 to +16384
Dataref throttle1 sim/cockpit2/engine/actuators/throttle_ratio[0] float Offset 0x088C INT16 1 r

; Throttle 2 (0x0924) - 2 bytes, -4096 to +16384
Dataref throttle2 sim/cockpit2/engine/actuators/throttle_ratio[1] float Offset 0x0924 INT16 1 r

; ══════════════════════════════════════════════════════════════════════════
; WARNINGS & ALERTS
; ══════════════════════════════════════════════════════════════════════════

; Stall Warning (0x036C) - 1 byte, 0=no, 1=stall
Dataref stall_warn sim/cockpit2/annunciators/stall_warning int Offset 0x036C UINT8 1 r

; Overspeed Warning (0x036D) - 1 byte, 0=no, 1=overspeed
Dataref overspeed_warn sim/cockpit2/annunciators/over_speed int Offset 0x036D UINT8 1 r

; Crash Flag (0x0840) - 2 bytes
Dataref crashed sim/flightmodel/failures/onground_any int Offset 0x0840 INT16 1 r

; ══════════════════════════════════════════════════════════════════════════
; ENGINE DATA
; ══════════════════════════════════════════════════════════════════════════

; Total Fuel (0x0AF4) - 2 bytes, lbs per gallon * 256
Dataref total_fuel_legacy sim/flightmodel/weight/m_fuel_total float Offset 0x0AF4 INT16 1 r

; Engine 1 Combustion (0x0894) - 2 bytes, 0=off, 1=firing
Dataref eng1_running sim/flightmodel/engine/ENGN_running[0] int Offset 0x0894 INT16 1 r

; Engine 2 Combustion (0x092C) - 2 bytes, 0=off, 1=firing
Dataref eng2_running sim/flightmodel/engine/ENGN_running[1] int Offset 0x092C INT16 1 r

; ══════════════════════════════════════════════════════════════════════════
; ACARS UNIVERSAL OFFSET BLOCK (Custom Fuel/Weight Data)
; ══════════════════════════════════════════════════════════════════════════

; ─── Generic / Fallback ─────────────────────────────────────────────────────
Dataref acars_fuel_generic sim/flightmodel/weight/m_fuel_total float Offset 0x66C0 FLOAT 1 r
Dataref acars_zfw_generic  sim/flightmodel/weight/m_fixed       float Offset 0x66C4 FLOAT 1 r
Dataref acars_payload_generic sim/flightmodel/weight/m_fixed    float Offset 0x66C8 FLOAT 1 r

; ─── Rotate MD-11 ───────────────────────────────────────────────────────────
Dataref acars_fuel_md11 rotate/md11/fuel/total_kg float Offset 0x66C0 FLOAT 1 r
Dataref acars_zfw_md11  rotate/md11/weight/zfw    float Offset 0x66C4 FLOAT 1 r

; ─── ToLiss A319/A320/A321 ──────────────────────────────────────────────────
Dataref acars_fuel_a32x toliss_airbus/fuel/total_fuel float Offset 0x66C0 FLOAT 1 r
Dataref acars_zfw_a32x  toliss_airbus/weight/ZFW      float Offset 0x66C4 FLOAT 1 r

; ─── Laminar / Zibo 737 ────────────────────────────────────────────────────
Dataref acars_fuel_b738 laminar/B738/fms/vref_fuel float Offset 0x66C0 FLOAT 1 r

; ─── FlightFactor 757/767 ──────────────────────────────────────────────────
Dataref acars_fuel_ff757 757/fuel/total_kg float Offset 0x66C0 FLOAT 1 r
Dataref acars_zfw_ff757  757/weight/zfw    float Offset 0x66C4 FLOAT 1 r

; ─── 777 (FlightFactor / SAM) ──────────────────────────────────────────────
Dataref acars_fuel_777 777/fuel/total_kg float Offset 0x66C0 FLOAT 1 r
Dataref acars_zfw_777  777/weight/zfw    float Offset 0x66C4 FLOAT 1 r
