name: Railway Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger Railway Deployment
        run: |
          echo "Railway will auto-deploy from GitHub push"
          echo "No manual trigger needed - Railway watches the main branch"
