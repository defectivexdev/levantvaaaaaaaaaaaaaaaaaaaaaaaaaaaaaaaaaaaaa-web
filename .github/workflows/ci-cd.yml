name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: Validation & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for semantic-release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript Check
        run: npx tsc --noEmit

  build-acars:
    name: Build ACARS Client
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: LevantACARS/react-ui/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install React UI dependencies
        working-directory: LevantACARS/react-ui
        run: npm install --legacy-peer-deps

      - name: Build React UI
        working-directory: LevantACARS/react-ui
        run: npm run build

      - name: Copy React build to wwwroot
        shell: pwsh
        run: |
          if (Test-Path "LevantACARS/LevantACARS/wwwroot") { Remove-Item -Path "LevantACARS/LevantACARS/wwwroot" -Recurse -Force }
          Copy-Item -Path "LevantACARS/react-ui/dist" -Destination "LevantACARS/LevantACARS/wwwroot" -Recurse -Force

      - name: Copy favicon.ico from React UI
        shell: pwsh
        run: |
          $source = "LevantACARS/react-ui/public/img/favicon.ico"
          $dest = "LevantACARS/LevantACARS/Assets/favicon.ico"
          if (Test-Path $source) {
            New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
            Copy-Item $source $dest -Force
            Write-Host "Copied favicon.ico from React UI to Assets folder"
          } else {
            Write-Host "Warning: favicon.ico not found at $source, skipping copy"
          }

      - name: Restore NuGet packages
        run: nuget restore LevantACARS/LevantACARS.sln

      - name: Build .NET Release
        working-directory: LevantACARS
        run: dotnet build LevantACARS.sln --configuration Release --no-restore

      - name: Publish .NET Application
        run: dotnet publish LevantACARS/LevantACARS/LevantACARS.csproj -c Release -r win-x64 --self-contained -o LevantACARS/installer/publish

      - name: Create default config.json template
        shell: pwsh
        run: |
          $config = @{
            api_base_url = "${{ secrets.BASE_URL }}/api/acars"
            app_key = "${{ secrets.APP_KEY }}"
            va_api_key = "LEVANTVIRTUALAIRLINE_WEBI_ACARS"
            api_timeout = 15
            ivao_client_id = "${{ secrets.IVAO_CLIENT_ID }}"
            ivao_client_secret = "${{ secrets.IVAO_CLIENT_SECRET }}"
            poll_interval_ms = 200
            heartbeat_interval_ms = 30000
            telemetry_buffer_interval = 4
            position_update_interval = 5
            discord_client_id = "${{ secrets.DISCORD_CLIENT_ID }}"
            cloudinary_cloud_name = "${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            airportdb_api_token = "${{ secrets.AIRPORTDB }}"
            log_level = "Information"
            auth_token = $null
            pilot_id = $null
            pilot_name = $null
            pilot_rank = $null
            pilot_avatar = $null
            pilot_hours = 0
            pilot_xp = 0
            weight_unit = "lbs"
          }
          $configJson = $config | ConvertTo-Json -Depth 10
          $configJson | Set-Content "LevantACARS/LevantACARS/config.default.json"

      - name: Setup WiX Toolset v3
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI Installer
        shell: pwsh
        run: |
          Write-Host "Starting MSI build process..."
          cd LevantACARS/installer
          
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Checking for publish directory..."
          if (-not (Test-Path "publish")) {
            throw "Publish directory not found at LevantACARS/installer/publish"
          }
          Write-Host "✓ Publish directory exists"
          
          Write-Host "Checking for Package.wxs..."
          if (-not (Test-Path "Package.wxs")) {
            throw "Package.wxs not found!"
          }
          Write-Host "✓ Package.wxs exists"

          Write-Host "Running heat.exe to harvest files..."
          heat.exe dir publish -cg PublishedFiles -gg -sfrag -srd -dr INSTALLDIR -nologo -sw5150 -sw5151 -out HarvestedFiles.wxs
          if ($LASTEXITCODE -ne 0) { 
            Write-Host "ERROR: Heat.exe failed with exit code $LASTEXITCODE"
            throw "Heat.exe failed"
          }
          Write-Host "✓ Heat.exe completed successfully"

          Write-Host "Running candle.exe to compile..."
          candle.exe -ext WixUIExtension -ext WixUtilExtension Package.wxs HarvestedFiles.wxs
          if ($LASTEXITCODE -ne 0) { 
            Write-Host "ERROR: Candle.exe failed with exit code $LASTEXITCODE"
            throw "Candle.exe failed"
          }
          Write-Host "✓ Candle.exe completed successfully"

          Write-Host "Running light.exe to create MSI..."
          light.exe -ext WixUIExtension -ext WixUtilExtension -sval -b publish Package.wixobj HarvestedFiles.wixobj -o "LevantACARS-Build.msi"
          if ($LASTEXITCODE -ne 0) { 
            Write-Host "ERROR: Light.exe failed with exit code $LASTEXITCODE"
            throw "Light.exe failed"
          }
          Write-Host "✓ Light.exe completed successfully"

          if (-not (Test-Path "LevantACARS-Build.msi")) {
            throw "MSI file was not created at expected location!"
          }
          
          $msiSize = (Get-Item "LevantACARS-Build.msi").Length
          Write-Host "✓ MSI created successfully: $msiSize bytes ($([math]::Round($msiSize/1MB, 2)) MB)"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          if (-not (Test-Path "LevantACARS/installer/publish")) {
            throw "Publish directory not found!"
          }
          Compress-Archive -Path "LevantACARS/installer/publish/*" -DestinationPath "LevantACARS-Build.zip" -Force
          Write-Host "✓ ZIP created successfully: $(Get-Item LevantACARS-Build.zip | Select-Object -ExpandProperty Length) bytes"

      - name: Verify Build Artifacts
        shell: pwsh
        run: |
          Write-Host "Checking for build artifacts..."
          if (Test-Path "LevantACARS/installer/LevantACARS-Build.msi") {
            Write-Host "✓ MSI found at: LevantACARS/installer/LevantACARS-Build.msi"
            Get-Item "LevantACARS/installer/LevantACARS-Build.msi" | Format-List Name, Length, LastWriteTime
          } else {
            Write-Host "✗ MSI NOT FOUND at expected path!"
          }
          if (Test-Path "LevantACARS-Build.zip") {
            Write-Host "✓ ZIP found at: LevantACARS-Build.zip"
            Get-Item "LevantACARS-Build.zip" | Format-List Name, Length, LastWriteTime
          } else {
            Write-Host "✗ ZIP NOT FOUND at expected path!"
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LevantACARS-Artifacts
          path: |
            LevantACARS/installer/LevantACARS-Build.msi
            LevantACARS-Build.zip
          if-no-files-found: error

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [validate, build-acars]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Download ACARS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: LevantACARS-Artifacts
          path: release-artifacts

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          # Run semantic-release and capture output
          npx semantic-release 2>&1 | tee release_output.txt
          
          # Check if release was created
          if grep -q "Published release" release_output.txt || grep -q "Created tag" release_output.txt; then
            # Get the latest tag
            version=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            
            if [[ -n "$version" ]]; then
              echo "new_release_published=true" >> $GITHUB_OUTPUT
              echo "new_release_version=${version}" >> $GITHUB_OUTPUT
              
              # Rename artifacts with the new version
              if [ -f "release-artifacts/LevantACARS-Build.msi" ]; then
                mv release-artifacts/LevantACARS-Build.msi "release-artifacts/LevantACARS-${version}.msi"
              fi
              if [ -f "release-artifacts/LevantACARS-Build.zip" ]; then
                mv release-artifacts/LevantACARS-Build.zip "release-artifacts/LevantACARS-${version}.zip"
              fi
              
              # Upload the versioned assets to the release
              gh release upload $version "release-artifacts/LevantACARS-${version}.msi" "release-artifacts/LevantACARS-${version}.zip" --clobber || true
            fi
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "No release created - no releasable commits found"
          fi

  manual-tag-release:
    name: Create Release from Manual Tag
    runs-on: ubuntu-latest
    needs: build-acars
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download ACARS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: LevantACARS-Artifacts
          path: release-artifacts

      - name: Get Tag Name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename Artifacts with Version
        run: |
          cd release-artifacts
          if [ -f "LevantACARS-Build.msi" ]; then
            mv LevantACARS-Build.msi "LevantACARS-${{ steps.tag.outputs.version }}.msi"
          fi
          if [ -f "LevantACARS-Build.zip" ]; then
            mv LevantACARS-Build.zip "LevantACARS-${{ steps.tag.outputs.version }}.zip"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/LevantACARS-${{ steps.tag.outputs.version }}.msi
            release-artifacts/LevantACARS-${{ steps.tag.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-preview:
    name: Vercel Preview Deployment
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} > vercel_url.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const url = fs.readFileSync('vercel_url.txt', 'utf8').trim();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment is ready: ${url}`
            });

  deploy-production:
    name: Vercel Production Deployment
    runs-on: ubuntu-latest
    needs: [validate, build-acars, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
