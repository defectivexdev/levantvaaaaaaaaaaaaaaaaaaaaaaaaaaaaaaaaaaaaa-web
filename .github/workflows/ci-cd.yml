name: Automated CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NODE_VERSION: '22'

jobs:
  version-bump:
    name: Auto Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_changed: ${{ steps.bump.outputs.version_changed }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Auto Increment Version
        id: bump
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          
          # Increment patch version
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          
          # Update version in LevantACARS react-ui
          cd LevantACARS/react-ui
          npm version $NEW_VERSION --no-git-tag-version --allow-same-version
          cd ../..
          
          # Commit version bump
          git add package.json package-lock.json LevantACARS/react-ui/package.json LevantACARS/react-ui/package-lock.json
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"
          
          # Create and push tag
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          
          echo "new_version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_changed=true" >> $GITHUB_OUTPUT

  validate:
    name: Validation & Linting
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint || true

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Check for Unused Dependencies
        run: |
          npx depcheck --ignores="@types/*,eslint-*,prettier,typescript" || true

      - name: Auto-fix Lint Issues
        if: failure()
        run: |
          npm run lint -- --fix || true
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: auto-fix lint issues [skip ci]" || echo "No fixes to commit"
          git push origin main || echo "Nothing to push"

  build-acars:
    name: Build ACARS Desktop Client
    runs-on: windows-latest
    needs: [version-bump, validate]
    if: always() && needs.validate.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get Version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=v$version" >> $env:GITHUB_OUTPUT
          echo "Version: v$version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: LevantACARS/react-ui/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install React UI dependencies
        working-directory: LevantACARS/react-ui
        run: npm ci --legacy-peer-deps

      - name: Lint React UI
        working-directory: LevantACARS/react-ui
        run: npm run lint || true

      - name: Build React UI
        working-directory: LevantACARS/react-ui
        run: npm run build

      - name: Copy React build to wwwroot
        shell: pwsh
        run: |
          if (Test-Path "LevantACARS/LevantACARS/wwwroot") { Remove-Item -Path "LevantACARS/LevantACARS/wwwroot" -Recurse -Force }
          Copy-Item -Path "LevantACARS/react-ui/dist" -Destination "LevantACARS/LevantACARS/wwwroot" -Recurse -Force

      - name: Copy favicon.ico from React UI
        shell: pwsh
        run: |
          $source = "LevantACARS/react-ui/public/img/favicon.ico"
          $dest = "LevantACARS/LevantACARS/Assets/favicon.ico"
          if (Test-Path $source) {
            New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
            Copy-Item $source $dest -Force
            Write-Host "Copied favicon.ico from React UI to Assets folder"
          } else {
            Write-Host "Warning: favicon.ico not found at $source, skipping copy"
          }

      - name: Restore NuGet packages
        run: nuget restore LevantACARS/LevantACARS.sln

      - name: Build .NET Release
        working-directory: LevantACARS
        run: dotnet build LevantACARS.sln --configuration Release --no-restore

      - name: Publish .NET Application
        run: dotnet publish LevantACARS/LevantACARS/LevantACARS.csproj -c Release -r win-x64 --self-contained -o LevantACARS/installer/publish

      - name: Create default config.json template
        shell: pwsh
        run: |
          $config = @{
            api_base_url = "${{ secrets.BASE_URL }}/api/acars"
            app_key = "${{ secrets.APP_KEY }}"
            va_api_key = "LEVANTVIRTUALAIRLINE_WEBI_ACARS"
            api_timeout = 15
            ivao_client_id = "${{ secrets.IVAO_CLIENT_ID }}"
            ivao_client_secret = "${{ secrets.IVAO_CLIENT_SECRET }}"
            poll_interval_ms = 200
            heartbeat_interval_ms = 30000
            telemetry_buffer_interval = 4
            position_update_interval = 5
            discord_client_id = "${{ secrets.DISCORD_CLIENT_ID }}"
            cloudinary_cloud_name = "${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            airportdb_api_token = "${{ secrets.AIRPORTDB }}"
            log_level = "Information"
            auth_token = $null
            pilot_id = $null
            pilot_name = $null
            pilot_rank = $null
            pilot_avatar = $null
            pilot_hours = 0
            pilot_xp = 0
            weight_unit = "lbs"
          }
          $configJson = $config | ConvertTo-Json -Depth 10
          $configJson | Set-Content "LevantACARS/LevantACARS/config.default.json"

      - name: Setup WiX Toolset v3
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Update MSI Version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $wxsPath = "LevantACARS/installer/Package.wxs"
          
          if (Test-Path $wxsPath) {
            $content = Get-Content $wxsPath -Raw
            $content = $content -replace 'Version="[0-9.]+"', "Version=`"$version`""
            Set-Content $wxsPath $content
            Write-Host "✓ Updated MSI version to $version"
          }

      - name: Build MSI Installer
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          Write-Host "Building MSI for version v$version"
          
          cd LevantACARS/installer
          
          if (-not (Test-Path "publish")) {
            throw "Publish directory not found!"
          }
          
          Write-Host "Running WiX toolset..."
          heat.exe dir publish -cg PublishedFiles -gg -sfrag -srd -dr INSTALLDIR -nologo -sw5150 -sw5151 -out HarvestedFiles.wxs
          if ($LASTEXITCODE -ne 0) { throw "Heat.exe failed" }
          
          candle.exe -ext WixUIExtension -ext WixUtilExtension Package.wxs HarvestedFiles.wxs
          if ($LASTEXITCODE -ne 0) { throw "Candle.exe failed" }
          
          light.exe -ext WixUIExtension -ext WixUtilExtension -sval -b publish Package.wixobj HarvestedFiles.wixobj -o "LevantACARS-v$version.msi"
          if ($LASTEXITCODE -ne 0) { throw "Light.exe failed" }
          
          if (-not (Test-Path "LevantACARS-v$version.msi")) {
            throw "MSI file was not created!"
          }
          
          $msiSize = (Get-Item "LevantACARS-v$version.msi").Length
          Write-Host "✓ MSI created: $([math]::Round($msiSize/1MB, 2)) MB"
          
          Copy-Item "LevantACARS-v$version.msi" "../../LevantACARS-v$version.msi" -Force
          Write-Host "✓ MSI ready for upload"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if (-not (Test-Path "LevantACARS/installer/publish")) {
            throw "Publish directory not found!"
          }
          Compress-Archive -Path "LevantACARS/installer/publish/*" -DestinationPath "LevantACARS-v$version.zip" -Force
          $zipSize = (Get-Item "LevantACARS-v$version.zip").Length
          Write-Host "✓ ZIP created: $([math]::Round($zipSize/1MB, 2)) MB"

      - name: Verify Build Artifacts
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          Write-Host "=== Verifying Build Artifacts for v$version ==="
          
          $msiPath = "LevantACARS-v$version.msi"
          $zipPath = "LevantACARS-v$version.zip"
          
          if (-not (Test-Path $msiPath)) {
            Write-Host "ERROR: MSI not found at $msiPath"
            exit 1
          }
          
          if (-not (Test-Path $zipPath)) {
            Write-Host "ERROR: ZIP not found at $zipPath"
            exit 1
          }
          
          $msiSize = (Get-Item $msiPath).Length
          $zipSize = (Get-Item $zipPath).Length
          
          Write-Host "✓ MSI: $([math]::Round($msiSize/1MB, 2)) MB"
          Write-Host "✓ ZIP: $([math]::Round($zipSize/1MB, 2)) MB"
          Write-Host "✓ All artifacts verified for v$version"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LevantACARS-${{ steps.version.outputs.version }}
          path: |
            LevantACARS-*.msi
            LevantACARS-*.zip
          if-no-files-found: error
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-bump, build-acars]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version-bump.outputs.version_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download ACARS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: LevantACARS-${{ needs.version-bump.outputs.new_version }}
          path: release-artifacts

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION="${{ needs.version-bump.outputs.new_version }}"
          echo "## 🚀 Release $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 What's Included" >> release_notes.md
          echo "- ✅ LevantACARS Desktop Client (Windows MSI)" >> release_notes.md
          echo "- ✅ Portable ZIP Archive" >> release_notes.md
          echo "- ✅ Web Application (Auto-deployed to Vercel)" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📝 Changes" >> release_notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release_notes.md || echo "- Initial release" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*Automatically generated and deployed by GitHub Actions*" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version-bump.outputs.new_version }}
          name: Release ${{ needs.version-bump.outputs.new_version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/LevantACARS-*.msi
            release-artifacts/LevantACARS-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-preview:
    name: Vercel Preview Deployment
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} > vercel_url.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const url = fs.readFileSync('vercel_url.txt', 'utf8').trim();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment is ready: ${url}`
            });

  deploy-production:
    name: Vercel Production Deployment
    runs-on: ubuntu-latest
    needs: [version-bump, validate, build-acars]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

      - name: Create Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version-bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Live" >> $GITHUB_STEP_SUMMARY
