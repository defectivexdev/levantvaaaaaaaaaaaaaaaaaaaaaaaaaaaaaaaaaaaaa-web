name: Build LevantACARS MSI Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup WiX Toolset 3.x
        run: |
          if (-not $env:WIX) {
            choco install wixtoolset -y
          }
          $wixBinPath = Join-Path $env:WIX "bin"
          echo $wixBinPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "WiX Toolset path: $wixBinPath"

      - name: Restore NuGet packages
        run: dotnet restore LevantACARS.sln
        working-directory: ./LevantACARS

      - name: Publish LevantACARS Application
        run: dotnet publish src/LevantACARS.App/LevantACARS.csproj --configuration Release --no-restore --runtime win-x64 --self-contained true
        working-directory: ./LevantACARS

      - name: Debug - List publish output
        run: |
          Write-Host "Checking publish output directory..." -ForegroundColor Cyan
          $publishPath = "src\LevantACARS.App\bin\Release\net8.0-windows\win-x64\publish"
          if (Test-Path $publishPath) {
            Write-Host "Contents of ${publishPath}:" -ForegroundColor Green
            Get-ChildItem $publishPath -Recurse | Select-Object FullName
          } else {
            Write-Host "Publish path does not exist: ${publishPath}" -ForegroundColor Red
            Write-Host "Searching for actual output location..." -ForegroundColor Yellow
            Get-ChildItem "src\LevantACARS.App\bin" -Recurse -Filter "*.exe" | Select-Object FullName
          }
        working-directory: ./LevantACARS

      - name: Build MSI Installer
        run: |
          $buildPath = "..\src\LevantACARS.App\bin\Release\net8.0-windows\win-x64\publish"
          $outputPath = ".\Output"
          $version = "2.0.0"
          
          Write-Host "Building Levant ACARS MSI Installer v$version" -ForegroundColor Cyan
          
          if (-not (Test-Path $outputPath)) {
            New-Item -ItemType Directory -Path $outputPath | Out-Null
          }
          
          Write-Host "[1/4] Harvesting published files with heat.exe..." -ForegroundColor Cyan
          heat.exe dir "$buildPath" `
            -cg HarvestedFiles `
            -gg `
            -scom `
            -sreg `
            -srd `
            -dr INSTALLFOLDER `
            -var var.BuildPath `
            -out HarvestedFiles.wxs
          
          if ($LASTEXITCODE -ne 0) { 
            Write-Host "Heat.exe failed!" -ForegroundColor Red
            exit 1 
          }
          
          Write-Host "[2/4] Compiling WiX source files..." -ForegroundColor Cyan
          candle.exe Product-Minimal.wxs HarvestedFiles.wxs `
            "-dBuildPath=$buildPath" `
            "-dVersion=$version" `
            -ext WixUIExtension `
            -ext WixUtilExtension
          
          if ($LASTEXITCODE -ne 0) { exit 1 }
          
          Write-Host "[3/4] Linking and creating MSI..." -ForegroundColor Cyan
          light.exe Product-Minimal.wixobj HarvestedFiles.wixobj `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            -cultures:en-us `
            -out "$outputPath\LevantACARS-$version.msi"
          
          if ($LASTEXITCODE -ne 0) { exit 1 }
          
          Write-Host "[4/4] MSI created successfully!" -ForegroundColor Green
          Write-Host "Output: $outputPath\LevantACARS-$version.msi" -ForegroundColor Green
        working-directory: ./LevantACARS/Installer

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LevantACARS-Installer-${{ github.sha }}
          path: ./LevantACARS/Installer/Output/*.msi
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ./LevantACARS/Installer/Output/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
