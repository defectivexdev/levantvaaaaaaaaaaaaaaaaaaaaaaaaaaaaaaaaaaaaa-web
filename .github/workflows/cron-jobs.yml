name: Cron Jobs (Backup for Railway)

on:
  schedule:
    # Cleanup - every 2 minutes
    - cron: '*/2 * * * *'
    # Daily tax - every day at 00:00 UTC
    - cron: '0 0 * * *'
    # Weekly salary - every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/2 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Cleanup Cron
        run: |
          curl -X GET "${{ secrets.RAILWAY_APP_URL }}/api/cron/cleanup"

  daily-tax:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Daily Tax Cron
        run: |
          curl -X GET "${{ secrets.RAILWAY_APP_URL }}/api/cron/weekly-tax"

  weekly-salary:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Weekly Salary Cron
        run: |
          curl -X GET "${{ secrets.RAILWAY_APP_URL }}/api/cron/weekly-salary"
