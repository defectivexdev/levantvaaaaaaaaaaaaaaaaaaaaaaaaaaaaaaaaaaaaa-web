name: Build on Push

on:
  push:
    branches:
      - main
    paths:
      - 'LevantACARS/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: LevantACARS/react-ui/package-lock.json
          
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Install React dependencies
        working-directory: LevantACARS/react-ui
        run: npm install --legacy-peer-deps
        
      - name: Build React UI
        working-directory: LevantACARS/react-ui
        run: npm run build
        
      - name: Copy React build to wwwroot
        shell: pwsh
        run: |
          if (Test-Path "LevantACARS/LevantACARS/wwwroot") { Remove-Item -Path "LevantACARS/LevantACARS/wwwroot" -Recurse -Force }
          Copy-Item -Path "LevantACARS/react-ui/dist" -Destination "LevantACARS/LevantACARS/wwwroot" -Recurse -Force
          
      - name: Restore .NET dependencies
        working-directory: LevantACARS
        run: dotnet restore LevantACARS.sln
        
      - name: Build .NET Release
        working-directory: LevantACARS
        run: dotnet build LevantACARS.sln --configuration Release --no-restore
        
      - name: Build Summary
        shell: pwsh
        run: |
          Write-Host "✅ Build completed successfully!"
          Write-Host "React UI built and copied to wwwroot"
          Write-Host ".NET application compiled in Release mode"
